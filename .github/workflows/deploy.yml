name: CD - Deploy to EC2

on:
  workflow_run:
    workflows: ["CI - Build & Test"]
    branches: [main]
    types:
      - completed

jobs:
  deploy:
    name: "Deploy"
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Cài JDK 21 ───────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      # ── Build tất cả Spring services ─────────────────────────
      - name: Build Spring JARs
        run: |
          for svc in admin-service api-gateway cart-service chat-service eureka-server order-service product-service wishlist-service; do
            echo "▶ Building $svc..."
            cd $GITHUB_WORKSPACE/hkt-be/$svc
            chmod +x mvnw
            ./mvnw clean package -DskipTests
            cd $GITHUB_WORKSPACE
          done

      # ── Cài Node.js 22 ───────────────────────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # ── Build Frontend ────────────────────────────────────────
      - name: Build Frontend
        working-directory: hkt-fe
        run: |
          npm ci
          npm run build

      # ── Copy .env và deploy ───────────────────────────────────
      - name: Deploy với Docker Compose
        run: |
          # Copy file .env đã có sẵn trên EC2 vào workspace
          cp ~/hkt-shop/.env $GITHUB_WORKSPACE/.env

          cd $GITHUB_WORKSPACE

          # Build images từ source code
          docker compose build --no-cache

          # Restart tất cả services
          docker compose up -d --remove-orphans

          # Dọn images cũ
          docker image prune -f

          echo "Deploy thành công!"
