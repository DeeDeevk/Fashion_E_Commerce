services:
  # 1. Database MariaDB
  mariadb:
    image: mariadb:11
    container_name: hkt-mariadb
    ports:
      - "3006:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./init_db/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      - hkt-network
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 2. DB UI
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: hkt-phpmyadmin
    ports:
      - "3005:80"
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    depends_on:
      - mariadb
    networks:
      - hkt-network

  # 3. Eureka Server (Discovery)
  eureka-server:
    build: ./hkt-be/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - hkt-network

  # 4. API Gateway
  api-gateway:
    build: ./hkt-be/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
      - redis
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      EUREKA_INSTANCE_IP_ADDRESS: ${API_GATEWAY}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - hkt-network

  # 5. Product Service (Port 8083)
  product-service:
    build: ./hkt-be/product-service
    container_name: product-service
    ports:
      - "8083:8083"
    depends_on:
      mariadb:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      EUREKA_INSTANCE_IP_ADDRESS: ${PRODUCT_SERVICE}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD}
    networks:
      - hkt-network

  # 6. Wishlist Service (Port 8082)
  wishlist-service:
    build: ./hkt-be/wishlist-service
    container_name: wishlist-service
    ports:
      - "8082:8082"
    depends_on:
      mariadb:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      EUREKA_INSTANCE_IP_ADDRESS: ${WISHLIST_SERVICE}
    networks:
      - hkt-network

  # 7. Cart Service (Port 8084)
  cart-service:
    build: ./hkt-be/cart-service
    container_name: cart-service
    ports:
      - "8084:8084"
    depends_on:
      mariadb:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      EUREKA_INSTANCE_IP_ADDRESS: ${CART_SERVICE}
    networks:
      - hkt-network

  # 8. Order Service (Port 8085)
  order-service:
    build: ./hkt-be/order-service
    container_name: order-service
    ports:
      - "8085:8085"
    depends_on:
      mariadb:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      EUREKA_INSTANCE_IP_ADDRESS: ${ORDER_SERVICE}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD}
    networks:
      - hkt-network

  # 9. User Service (Node.js - Port 8081)
  user-service:
    build: ./hkt-be/user-service
    container_name: user-service
    ports:
      - "8081:8081"
    depends_on:
      mariadb:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      PORT: ${USER_PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${MARIADB_ROOT_PASSWORD}
      DB_PASS: ${MARIADB_ROOT_PASSWORD}
      DB_NAME: ${MARIADB_DATABASE}
      EUREKA_HOST: ${EUREKA_HOST}
      EUREKA_PORT: ${EUREKA_PORT}
      APP_NAME: ${USER_SERVICE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      EUREKA_INSTANCE_IP_ADDRESS: ${USER_SERVICE}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    networks:
      - hkt-network
    restart: always

  # 10. Frontend (Vite)
  frontend:
    build: ./hkt-fe
    container_name: hkt-frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - hkt-network

  # 11. Admin Service (Port 8086)
  admin-service:
    build: ./hkt-be/admin-service
    container_name: admin-service
    ports:
      - "8086:8086"
    depends_on:
      mariadb:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${MARIADB_ROOT_PASSWORD}
      SPRING_DATASOURCE_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      EUREKA_INSTANCE_IP_ADDRESS: ${ADMIN_SERVICE}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD}
    networks:
      - hkt-network

  # 12. Qdrant
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - hkt-network

  # 13. Chat Service (Port 8087)
  chat-service:
    build: ./hkt-be/chat-service
    container_name: chat-service
    ports:
      - "8087:8087"
    depends_on:
      mariadb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started
      qdrant:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${MARIADB_ROOT_PASSWORD}
      SPRING_DATASOURCE_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      EUREKA_INSTANCE_IP_ADDRESS: ${CHAT_SERVICE}
      GROQ_API_KEY: ${GROQ_API_KEY}
      QDRANT_HOST: ${QDRANT_HOST}
      QDRANT_PORT: ${QDRANT_PORT}
      JINA_API_KEY: ${JINA_API_KEY}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD}
    networks:
      - hkt-network
    restart: on-failure

  # 14. Redis
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - hkt-network

  # 15. RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    environment:
      RABBITMQ_DEFAULT_USER: ${SPRING_RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${SPRING_RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - hkt-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    command: >
      sh -c "rabbitmq-plugins enable rabbitmq_prometheus && rabbitmq-server"

  # =========================================
  # MONITORING STACK
  # =========================================

  # Prometheus - thu thập metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: hkt-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    restart: unless-stopped
    networks:
      - hkt-network

  # Grafana - dashboard & visualization
  grafana:
    image: grafana/grafana:latest
    container_name: hkt-grafana
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    restart: unless-stopped
    networks:
      - hkt-network
    depends_on:
      - prometheus
      - loki

  # Loki - log aggregation
  loki:
    image: grafana/loki:latest
    container_name: hkt-loki
    ports:
      - "3200:3100"
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - hkt-network

  # Promtail - đẩy log container lên Loki
  promtail:
    image: grafana/promtail:latest
    container_name: hkt-promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/promtail.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - hkt-network
    depends_on:
      - loki

  # mysqld-exporter - expose MariaDB metrics
  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    container_name: hkt-mysqld-exporter
    ports:
      - "9104:9104"
    command:
      - "--mysqld.address=mariadb:3306"
      - "--mysqld.username=root"
    environment:
      MYSQLD_EXPORTER_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hkt-network

  # redis-exporter - expose Redis metrics
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: hkt-redis-exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - hkt-network

networks:
  hkt-network:
    driver: bridge

volumes:
  mariadb_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  loki_data: