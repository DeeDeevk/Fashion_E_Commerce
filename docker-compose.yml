services:
  # 1. Database MariaDB
  mariadb:
    image: mariadb:11
    container_name: hkt-mariadb
    ports:
      - "3006:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./init_db/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      - hkt-network

  # 2. Eureka Server (Discovery)
  eureka-server:
    build: ./hkt-be/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - hkt-network

  # 3. API Gateway
  api-gateway:
    build: ./hkt-be/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      EUREKA_INSTANCE_IP_ADDRESS: ${API_GATEWAY}
    networks:
      - hkt-network

  # 4. Product Service (Port 8083)
  product-service:
    build: ./hkt-be/product-service
    container_name: product-service
    ports:
      - "8083:8083"
    depends_on:
      - mariadb
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      EUREKA_INSTANCE_IP_ADDRESS: ${PRODUCT_SERVICE}
    networks:
      - hkt-network

  # 5. Wishlist Service (Port 8082)
  wishlist-service:
    build: ./hkt-be/wishlist-service
    container_name: wishlist-service
    ports:
      - "8082:8082"
    depends_on:
      - mariadb
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      EUREKA_INSTANCE_IP_ADDRESS: ${WISHLIST_SERVICE}
    networks:
      - hkt-network

  # 6. Cart Service (Port 8084)
  cart-service:
    build: ./hkt-be/cart-service
    container_name: cart-service
    ports:
      - "8084:8084"
    depends_on:
      - mariadb
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      EUREKA_INSTANCE_IP_ADDRESS: ${CART_SERVICE}
    networks:
      - hkt-network

  # 7. Order Service (Port 8085)
  order-service:
    build: ./hkt-be/order-service
    container_name: order-service
    ports:
      - "8085:8085"
    depends_on:
      - mariadb
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      EUREKA_INSTANCE_IP_ADDRESS: ${ORDER_SERVICE}
    networks:
      - hkt-network

  # 8. User Service (Node.js - Port 3000)
  user-service:
    build: ./hkt-be/user-service
    container_name: user-service
    ports:
      - "8081:8081"
    volumes:
      - ./hkt-be/user-service:/app
      - /app/node_modules
    depends_on:
      - mariadb
      - eureka-server
    environment:
      PORT: ${USER_PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${MARIADB_ROOT_PASSWORD}
      DB_PASS: ${MARIADB_ROOT_PASSWORD}
      DB_NAME: ${MARIADB_DATABASE}
      EUREKA_HOST: ${EUREKA_HOST}
      EUREKA_PORT: ${EUREKA_PORT}
      APP_NAME: ${USER_SERVICE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      EUREKA_INSTANCE_IP_ADDRESS: ${USER_SERVICE}
    networks:
      - hkt-network
    restart: always
  # 9. Frontend (Vite)
  frontend:
    build: ./hkt-fe
    container_name: hkt-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./hkt-fe:/app
      - /app/node_modules
    depends_on:
      - api-gateway
    networks:
      - hkt-network

  # 10. Admin Service (Port 8086)
  admin-service:
    build: ./hkt-be/admin-service
    container_name: admin-service
    ports:
      - "8086:8086"
    depends_on:
      - mariadb
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${MARIADB_ROOT_PASSWORD}
      SPRING_DATASOURCE_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      EUREKA_INSTANCE_IP_ADDRESS: ${ADMIN_SERVICE}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    networks:
      - hkt-network
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - hkt-network

  # 12. Chat Service (Port 8087)
  chat-service:
    build: ./hkt-be/chat-service
    container_name: chat-service
    ports:
      - "8087:8087"
    depends_on:
      - mariadb
      - eureka-server
      - qdrant
      - ollama
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${MARIADB_ROOT_PASSWORD}
      SPRING_DATASOURCE_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      EUREKA_INSTANCE_IP_ADDRESS: ${CHAT_SERVICE}
      GROQ_API_KEY: ${GROQ_API_KEY}
      QDRANT_HOST: ${QDRANT_HOST}
      QDRANT_PORT: ${QDRANT_PORT}
      OLLAMA_URL: ${OLLAMA_URL}
    networks:
      - hkt-network
    restart: on-failure
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - hkt-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

    restart: unless-stopped

    volumes:
      - redis_data:/data

    command: redis-server --appendonly yes

    networks:
      - hkt-network
networks:
  hkt-network:
    driver: bridge

volumes:
  mariadb_data:
  ollama_data:
  redis_data:
